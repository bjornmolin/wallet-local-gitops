apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafbat-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: kafbat.dev.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafbat-ui-kafka-ui
                port:
                  number: 80
